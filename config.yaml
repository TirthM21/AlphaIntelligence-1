# AlphaIntelligence Capital — Quantitative Alpha Engine Configuration

# Stock Universe - Add/remove tickers as needed
stock_universe:
  # Tech
  - AAPL
  - MSFT
  - GOOGL
  - META
  - NVDA
  - AMD
  - TSLA
  - NFLX

  # Finance
  - JPM
  - BAC
  - GS
  - MS

  # Healthcare
  - JNJ
  - UNH
  - PFE
  - ABBV

  # Consumer
  - AMZN
  - WMT
  - HD
  - NKE
  - SBUX

  # Industrial
  - BA
  - CAT
  - GE
  - UPS

  # Energy
  - XOM
  - CVX

  # Add more tickers here...

# Screening Parameters
parameters:
  # Minimum score thresholds
  min_buy_score: 70
  min_sell_score: 60

  # Market breadth requirement
  min_phase2_pct: 15.0

  # Data requirements
  min_data_days: 200

  # Volume threshold for breakouts
  volume_threshold: 1.5

  # Maximum extension from 50 SMA for buy signals
  max_extension_pct: 25.0

  # Cache settings
  cache_expiry_hours: 24

# Output Settings
output:
  # Print detailed fundamental snapshots
  show_fundamentals: true

  # Print detailed phase analysis
  show_phase_details: true

  # Save results to file
  save_to_file: true
  output_dir: "./data/results"

# Event Risk Controls (earnings + macro windows)
event_risk:
  enabled: true
  earnings_window_days: 3
  macro_window_days: 2
  block_entry_levels: [high]
  downweight:
    medium: 0.85
    high: 0.65
  # Optional mocked payload path for deterministic runs/tests
  mock_payload_path: null
  # Inline fallback payload used when no external payload path is configured
  mock_payload:
    earnings: []
    macro_events: []


# Newsletter Data Source Priority Matrix
newsletter:
  providers:
    macro: [yfinance]
    headlines: [yfinance]
    sector_performance: [yfinance]
    prices: [yfinance]

# Runtime defaults (can be overridden by environment variables like
# ALPHA_FETCHER_MAX_RETRIES, ALPHA_AI_AGENT_MAX_TOKENS, etc.)
runtime:
  fetcher:
    cache_dir: "./data/cache"
    cache_expiry_hours: 24
    max_retries: 3
    retry_delay_seconds: 2

  ai_agent:
    base_url: "https://integrate.api.nvidia.com/v1"
    default_model: "moonshotai/kimi-k2.5"
    request_timeout_seconds: 45
    max_retries: 1
    max_tokens: 4096
    failure_threshold: 2
    cooldown_seconds: 900

  optimized_batch_processor:
    results_dir: "./data/batch_results"
    max_workers: 5
    rate_limit_delay: 0.2
    batch_size: 100
    prefetch_batch_size: 500
    prefetch_pause_seconds: 2
    rate_limit_cooldown_seconds: 30
    rate_limit_error_threshold: 3
    max_backoff_delay: 5
